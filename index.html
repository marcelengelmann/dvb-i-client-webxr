<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script type="module" src="/src/main.ts"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DVB-I Client for WebXR</title>
</head>

<body>
  <a-scene>
    <a-dvbi-player position="0 0 -8" muted="true"></a-dvbi-player>
    <a-dvbi-player position="0 10 -6" rotation="40 0 0" muted="true"></a-dvbi-player>
    <a-camera position="0 0 0" look-controls mouse-cursor>
      <a-cursor fuse="true" rayOrigin="mouse" raycaster="objects: .raycastObject"></a-cursor>
    </a-camera>
    <a-entity laser-controls="hand: left;" raycaster="objects: .raycastObject"></a-entity>
    <a-entity laser-controls="hand: right;" raycaster="objects: .raycastObject"></a-entity>
  </a-scene>
</body>

</html>

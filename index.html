<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script type="module" src="src/main.ts"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DVB-I Client for WebXR</title>
</head>

<body>

  <a-scene id="scene" background="color: lightgrey" cursor="rayOrigin: mouse" xr-mode-ui="XRMode: xr">
    <a-camera id="camera" position="0 1.6 0">
    </a-camera>
    <a-entity laser-controls="hand: left;" raycaster="objects: .clickable, .grabbable, .droppable, .resizeHandler"
      dvbi-controller></a-entity>
    <a-entity laser-controls="hand: right;" raycaster="objects: .clickable, .grabbable, .droppable, .resizeHandler"
      dvbi-controller></a-entity>
    <a-dvbi-player position="0.0 1.6 -2.0" muted="false" width="4" camera-position-listener></a-dvbi-player>
    <!-- <a-dvbi-player position="0.0 1.6 6.0" muted="false" width="4" camera-position-listener></a-dvbi-player> -->
    <a-dvbi-player-channels-menu backgroundcolor="grey" position="-3 1.6 -2"></a-dvbi-player-channels-menu>
    <a-dvbi-player-trash position="0 0 -1"></a-dvbi-player-trash>
  </a-scene>

</body>

</html>
